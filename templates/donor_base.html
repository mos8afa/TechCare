{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TECH CARE - Donor</title>

    <link rel="stylesheet" href="{% static 'Css/Donor.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
</head>

<body>
    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">
                        <img src="{% static 'img/logo.png' %}" alt="{{name}}">
                    </span>
                    <div>
                        <h2>TechCare</h2>
                        <p>Medical Portal</p>
                    </div>
                    <button class="sidebar-toggle">
                        <i class="bi bi-layout-sidebar-inset-reverse"></i>
                    </button>
                </div>
            </div>

            {% block sidebar %}

            {% endblock sidebar %}
        </aside>


        <div style="flex:1; display:flex; flex-direction:column;">

            <!-- Top Navbar -->
            <div class="topbar">
                {% block title %}
                {% endblock title %}

                <div class="topbar-right">
                    <div class="topbar-icon" id="notificationBtn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="notification-badge"></span>
                        <div class="inbox" id="notificationBox">
                            <div class="notification-item" onclick="window.location.href='Notifications.html'">
                                <img src="https://randomuser.me/api/portraits/men/32.jpg">
                                <div class="notification-content">
                                    <h4>Ahmed Ali</h4>
                                    <p>New Consultation Request</p>
                                </div>
                            </div>
                            <hr>
                            <div class="notification-item" onclick="window.location.href='Notifications.html'">
                                <img src="https://randomuser.me/api/portraits/women/12.jpg">
                                <div class="notification-content">
                                    <h4>Sara Mohamed</h4>
                                    <p>Appointment Confirmed</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <hr class="line">
                    <div class="topbar-profile" onclick="window.location.href='{% url "donor:dashboard" %}'">
                        <div class="topbar-user-info">
                            <h4>{{name}}</h4>
                        </div>
                        <img src="{{profile_pic.url}}" alt="{{name}}">
                    </div>
                </div>
            </div>
        {% block content %}{% endblock %}
</body>
<script src="{% static 'JS/Board.js' %}"></script>
</html>
