<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Donation Request</title>

    <link rel="stylesheet" href="Donor.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>

<body class="no-scroll-page">
    <div class="dashboard">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">
                        <img src="../img/logo.png" alt="">
                    </span>
                    <div>
                        <h2>TechCare</h2>
                        <p>Medical Portal</p>
                    </div>
                    <button class="sidebar-toggle">
                        <i class="bi bi-layout-sidebar-inset-reverse"></i>
                    </button>
                </div>
            </div>

            <aside class="aside">
                <a href="Profile.html" class="aside-item">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>
                <a href="Requests.html" class="aside-item">
                    <i class="ri-file-list-line"></i>
                    <span>Requests</span>
                </a>
                <a href="Notifications.html" class="aside-item">
                    <i class="fa-regular fa-bell"></i>
                    <span>Notifications</span>
                </a>
                <a href="Donation.html" class="aside-item active">
                    <i class="ri-hand-heart-line"></i>
                    <span style="white-space: nowrap; font-size: 13px;">Donation</span>
                </a>
                <a href="Wallet.html" class="aside-item">
                    <i class="ri-wallet-3-line"></i>
                    <span>Wallet</span>
                </a>
                <a href="Complaints.html" class="aside-item">
                    <i class="ri-error-warning-line"></i>
                    <span>Complaints</span>
                </a>
            </aside>
        </aside>

        <div style="flex:1; display:flex; flex-direction:column; background-color: #f8fafc; min-height: 100vh;">

            <!-- Top Navbar -->
            <div class="topbar" style="background-color: #ffffff; border-bottom: 1px solid #e2e8f0;">
                <h2 class="topbar-title">Patient Profile</h2>

                <div class="topbar-right">
                    <div class="topbar-icon" id="notificationBtn">
                        <i class="fa-regular fa-bell"></i>
                        <span class="notification-badge" style="background: #ef4444; width: 6px; height: 6px; border-radius: 50%; display: inline-block; position: absolute; top: 5px; right: 5px;"></span>
                    </div>
                    <hr class="line">
                    <div class="topbar-profile">
                        <div class="topbar-user-info">
                            <h4 style="font-weight: 600; color: #1e293b;">Menna Ali</h4>
                        </div>
                        <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Donor" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover;">
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <main class="create-donation-main">
                <div class="create-donation__header">
                    <h1 class="create-donation__title">Create Donation Request</h1>
                    <p class="create-donation__subtitle">Provide the patient details to broadcast your urgent request to local donors.</p>
                </div>

                <div class="create-donation__photo-section">
                    <div class="create-donation__photo-circle">
                        <i class="ri-user-line"></i>
                        <div class="create-donation__photo-badge">
                            <i class="ri-check-line"></i>
                        </div>
                    </div>
                    <h3 class="create-donation__photo-title">Patient Photo</h3>
                    <p class="create-donation__photo-desc">Optional, but recommended for faster response</p>
                </div>

                <div class="create-donation__card">
                    <div class="create-donation__form-row">
                        <div class="create-donation__form-group">
                            <label class="create-donation__label">PATIENT NAME</label>
                            <input type="text" class="create-donation__input" placeholder="Full legal name">
                        </div>
                        <div class="create-donation__form-group">
                            <label class="create-donation__label">REQUIRED BLOOD TYPE</label>
                            <div class="create-donation__select-wrapper">
                                <select class="create-donation__select">
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                </select>
                                <i class="ri-arrow-down-s-line create-donation__select-icon"></i>
                            </div>
                        </div>
                    </div>

                    <div class="create-donation__form-row">
                        <div class="create-donation__form-group">
                            <label class="create-donation__label">GOVERNORATE</label>
                            <div class="create-donation__select-wrapper">
                                <select class="create-donation__select">
                                    <option>Cairo</option>
                                    <option>Giza</option>
                                    <option>Alexandria</option>
                                </select>
                                <i class="ri-arrow-down-s-line create-donation__select-icon"></i>
                            </div>
                        </div>
                        <div class="create-donation__form-group">
                            <label class="create-donation__label">DETAILED ADDRESS</label>
                            <input type="text" class="create-donation__input" placeholder="Hospital wing, Room number or Street">
                        </div>
                    </div>

                    <div class="create-donation__form-row create-donation__form-row--full">
                        <div class="create-donation__form-group">
                            <label class="create-donation__label">CASE DESCRIPTION</label>
                            <textarea class="create-donation__textarea" placeholder="Describe the medical situation..."></textarea>
                        </div>
                    </div>

                    <div class="create-donation__form-row create-donation__form-row--full" style="margin-bottom: 10px;">
                        <div class="create-donation__form-group">
                            <label class="create-donation__label">URGENCY LEVEL</label>
                            <div class="create-donation__urgency-group">
                                <button class="create-donation__urgency-btn create-donation__urgency-btn--active">Normal</button>
                                <button class="create-donation__urgency-btn">Urgent</button>
                                <button class="create-donation__urgency-btn">Critical</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="create-donation__footer">
                    <button class="create-donation__btn create-donation__btn--cancel">Cancel</button>
                    <button class="create-donation__btn create-donation__btn--submit">Broadcast Request</button>
                </div>
            </main>
        </div>

    </div>
</body>
<script src="../JS/Board.js"></script>
</html>
