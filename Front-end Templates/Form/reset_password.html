<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../Css/animations.css">
    <link rel="stylesheet" href="../Css/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body
        {
        background-image: url("../img/BG.jpeg");
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: fixed;
        background-size: cover;            
        background-size: cover;
        }
    </style>
</head>

<body>
    <header class="top-header">
        <div class="lang-dropdown" id="langBtn">
            <i class="fas fa-globe"></i>
            <span id="currentLang">English</span>
            <i class="fas fa-chevron-down"></i>
            <ul class="dropdown-menu" id="langMenu">
                <li>English</li>
                <li>العربية</li>
            </ul>
        </div>
    </header>

    <main class="login-container animate slide-up">

        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>

        <form id="resetForm" method="post">
            <div class="input-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input id="passwordInput" type="password" placeholder="Enter new password" required>
                    <i class="far fa-eye show-password" id="togglePassword"></i>
                </div>
            </div>

            <div class="input-group password">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input id="newpasswordInput" type="password" placeholder="Confirm new password" required>
                    <i class="far fa-eye show-password" id="newtogglePassword"></i>
                </div>
            </div>

            <div class="error margin">
                {{ errors.password }}
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-login">Reset Password</button>
            </div>
        </form>

    </main>

</body>
    <script src="../JS/Form.js"></script>
</html>
