<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>

    <link rel="stylesheet" href="../Css/animations.css">
    <link rel="stylesheet" href="../Css/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body
        {
        background-image: url("../img/BG.jpeg");
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: fixed;
        background-size: cover;            
        background-size: cover;
        }
    </style>
</head>

<body>
    <header class="top-header">
        <div class="lang-dropdown" id="langBtn">
            <i class="fas fa-globe"></i>
            <span id="currentLang">English</span>
            <i class="fas fa-chevron-down"></i>
            <ul class="dropdown-menu" id="langMenu">
                <li>English</li>
                <li>العربية</li>
            </ul>
        </div>
    </header>

    <main class="login-container animate slide-up">

        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Verify OTP</h1>
            <p>Enter the 6-digit code sent to your email</p>
        </div>

        <form method="POST">
            <div class="otp-wrapper">
                <input type="text" maxlength="1" class="otp-input" id="otp1" autofocus>
                <input type="text" maxlength="1" class="otp-input" id="otp2">
                <input type="text" maxlength="1" class="otp-input" id="otp3">
                <input type="text" maxlength="1" class="otp-input" id="otp4">
                <input type="text" maxlength="1" class="otp-input" id="otp5">
                <input type="text" maxlength="1" class="otp-input" id="otp6">
            </div>

            <div class="form-options" style="justify-content: center;">
                <span>Didn't recive OTP?<a href="resend.html"> Click here</a></span>
            </div>

            <div class="error margin">
                {{ errors.otp_invalid }}
            </div>

            <div class="form-actions">
                <button type="button" class="btn-login" onclick="window.location.href='reset_password.html'">Continue</button>
                <button type="button" class="btn-reset"><a href="Forget_password.html">Back</a></button>
            </div>

        </form>

    </main>

    <script src="../JS/Form.js"></script>

</body>
</html>
