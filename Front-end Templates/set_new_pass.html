<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>

    <!-- Css -->
    <link rel="stylesheet" href="Css/Login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="">
</head>
<body style="background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url(../img/BG.jpeg) no-repeat center center fixed; background-size: cover;">

    <header class="top-header">
        <div class="lang-dropdown" id="langBtn">
            <i class="fas fa-globe"></i>
            <span id="currentLang">English</span>
            <i class="fas fa-chevron-down"></i>
            <ul class="dropdown-menu" id="langMenu">
                <li>English</li>
                <li>العربية</li>
            </ul>
        </div>
    </header>

    <main class="login-container">

        <div class="logo-section">
            <div class="logo-icon">
                <i class="fa-solid fa-unlock"></i>
            </div>
            <h1>Set New Password</h1>
            <p>must be at least 8 characters</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input id="password" name="password" type="password" placeholder="Enter new password" required>
                    <i class="far fa-eye show-password" id="togglePassword"></i>
                </div>
            </div>

            <div class="input-group password1">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm your password" required>
                    <i class="far fa-eye show-password" id="toggleConfirmPassword"></i>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-login">Set New Password</button>
                <button type="reset" class="btn-reset">Reset</button>
            </div>


    </main>

    <script src="JS/login.js"></script>
</body>
</html>
